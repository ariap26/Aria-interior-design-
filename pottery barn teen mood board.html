<!DOCTYPE html>
<html>
<head>
    <title>Room Styles - Tutorial</title>
    <style>
        /* Warm Orange & Yellow Theme */
        body {
            background-color: #FFF9E1; /* Soft Creamy Yellow Background */

            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            background: white;
            padding: 30px;

        a {
            color: #D35400; /* Darker Orange for links */
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Styling the description boxes */
        textarea {
            width: 100%;
            height: 60px;
            border: 2px solid #FFCC80; /* Light Orange Border */

            padding: 10px;
            font-family: inherit;
            color: #D35400;
            margin-top: 20px;
            resize: none;
            background-color: #FFFDF5;
        }

        /* Styling your tutorial images */
        img {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px solid #FFCC80;
        }

            text-align: center;
            font-size: 24px;
            color: #E67E22;
        }

</head>
