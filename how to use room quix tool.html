<!DOCTYPE html>
<html>
<head>
    <title>Room Quiz Tool - Teal Theme</title>
    <style>
        /* Teal & Seafoam Theme */
        body {
            background-color: #E0F2F1; /* Soft Teal Background */
            color: #004D40;           /* Deep Dark Teal Text */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 77, 64, 0.1);
            border: 2px solid #80CBC4; /* Medium Teal Border */
        }

        a {
            color: #00796B; /* Bold Teal for links */
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Styling the description boxes */
        textarea {
            width: 100%;
            height: 60px;
            border: 2px solid #B2DFDB; /* Light Teal Border */
            border-radius: 10px;
            padding: 10px;
            font-family: inherit;
            color: #004D40;
            margin-top: 20px;
            resize: none;
            background-color: #F5FCFB;
        }

        /* Styling your quiz screenshots */
        img {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px solid #B2DFDB;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: #00695C;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="coastal.html">← Back to Home Page</a>

    <h1>How to Use the Roometry Quiz</h1>

    <textarea>How to use the roometry room style quiz tool</textarea>
    <img src="s.png" alt="Room quiz"/>

    <textarea>First they ask what colors you prefer</textarea>
    <img src="color.png" alt="Color scheme"/>

    <textarea>Next they ask what collage prints you prefer</textarea>
    <img src="print.png" alt="print"/>

    <textarea>Then they ask what bedding you prefer</textarea>
    <img src="bed.png" alt="bedding"/>

    <textarea>Then they ask what mirror you prefer</textarea>
    <img src="mirror.png" alt="mirror"/>

    <textarea>Then they ask what rug you prefer</textarea>
    <img src="rug.png" alt="rug"/>

    <textarea>Then they continue to ask about your hobbies, how cluttered your room is, how much you like your current room, and what app you use the most. You do have to put in your email but just so they know you are not a bot. Then I got my results! I got Danish pastel. Next you can press on it and it will show you different lighting, bedding, decor, and accessories you need to make your room come to life in this style.</textarea>
</div>

</body>
</html>
