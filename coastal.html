<!DOCTYPE html>
<html>
<head>
    <title>Room Styles Board</title>
    <style>
        body {
            /* Violet background with white glitter dots */
            background-color: #EE82EE;
            background-image: 
                radial-gradient(circle, white 1px, transparent 1px),
                radial-gradient(circle, white 1px, transparent 1px);
            background-size: 40px 40px, 20px 20px;
            background-position: 0 0, 10px 10px;
            
            color: #4A004A;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9); /* Transparent white board */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        a {
            color: #8B008B;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            max-width: 500px;
            height: 50px;
            margin: 15px 0;
            border: 2px solid #DA70D6;
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
        }

        img {
            max-width: 500px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: block;
        }

        h1 { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Room Style Board</h1>
    
    <a href="howtochangeroom.html">How To change your room style!</a>
    <a href="how to use room quix tool.html">How to use room quiz tool</a>
    <a href="pottery barn teen mood board.html">PB mood board</a>

    <textarea>Here are some room styles I love</textarea>

    <textarea>Room with purple accents</textarea>
    <img src="purpleroom.png" alt="Room with purple blanket">

    <textarea>Room with loftbed</textarea>
    <img src="loftbed.png" alt="Room with loftbed">

    <textarea>Coastal Bright room</textarea>
    <img src="rainbowroom.png" alt="Coastal bright room">

    <textarea>Room with storage bed</textarea>
    <img src="randomroom.png" alt="Room with higher bed and storage">

    <textarea>Room with teal and gold accents</textarea>
    <img src="tealgoldroom.png" alt="Room with teal and gold accents">
</div>

</body>
</html>
